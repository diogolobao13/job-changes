name: job-change-detector

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch: {}

concurrency:
  group: job-change-detector
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - name: Run detector
        run: npm start
        env:
          UNIPILE_DSN: ${{ secrets.UNIPILE_DSN }}
          UNIPILE_API_KEY: ${{ secrets.UNIPILE_API_KEY }}
          UNIPILE_ACCOUNT_ID: ${{ secrets.UNIPILE_ACCOUNT_ID }}
          SEARCH_BODY: ${{ secrets.SEARCH_BODY }}
          PAGE_LIMIT: "10"
          PAGE_DELAY_MS: "3000"
          MAX_PAGES: "200"
          PROFILE_DELAY_MS: "4000"
          MAX_PROFILE_FETCHES: "120"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CONTACTS_TABLE: active_campaign_linkedin
          CHANGES_TABLE: linkedin_job_changes
          WEBHOOK_URL: https://webhook.slcomm.xyz/webhook/mudanca-de-empresa
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
